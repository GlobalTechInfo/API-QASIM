name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
version-resolver:
  major:
    labels: [breaking-change]
  minor:
    labels: [feature, enhancement]
  patch:
    labels: [bug, fix, chore, documentation]
  default: patch
categories:
  - title: 'Features'
    labels: [feature, enhancement]
  - title: 'Bug Fixes'
    labels: [bug, fix]
  - title: 'Documentation'
    labels: [documentation]
  - title: 'Maintenance'
    labels: [chore, dependencies]
  - title: 'Breaking Changes'
    labels: [breaking-change]
template: |
  ## Changes

  $CHANGES

  **Full Changelog**: https://github.com/GlobalTechInfo/api-qasim/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
