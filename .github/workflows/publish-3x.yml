name: Publish (3.x)

on:
  push:
    tags:
      - 'v3.*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Obfuscate, test & publish to npm
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build (.mjs wrappers)
        run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish to npm (tag 3x, with provenance)
        run: npm publish --tag 3x --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
